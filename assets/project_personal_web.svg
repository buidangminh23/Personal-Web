<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g1)"/>
  <!-- Navbar -->
  <rect x="0" y="0" width="800" height="56" fill="rgba(15,12,41,0.9)"/>
  <circle cx="30" cy="28" r="14" fill="url(#accent1)"/>
  <text x="50" y="33" fill="white" font-size="16" font-weight="bold" font-family="sans-serif">MinhStark</text>
  <text x="500" y="33" fill="#a5b4fc" font-size="13" font-family="sans-serif">Trang chủ</text>
  <text x="570" y="33" fill="#a5b4fc" font-size="13" font-family="sans-serif">Kỹ năng</text>
  <text x="630" y="33" fill="#a5b4fc" font-size="13" font-family="sans-serif">Dự án</text>
  <text x="690" y="33" fill="#a5b4fc" font-size="13" font-family="sans-serif">Liên hệ</text>
  <!-- Hero -->
  <text x="80" y="140" fill="#a5b4fc" font-size="14" font-family="sans-serif" letter-spacing="3">XIN CHÀO, TÔI LÀ</text>
  <text x="80" y="195" fill="white" font-size="52" font-weight="bold" font-family="sans-serif">Bùi Đăng Minh</text>
  <rect x="80" y="205" width="300" height="4" rx="2" fill="url(#accent1)"/>
  <text x="80" y="235" fill="#c4b5fd" font-size="18" font-family="sans-serif">Data Science Student &amp; Web Dev</text>
  <!-- Buttons -->
  <rect x="80" y="265" width="140" height="42" rx="21" fill="url(#accent1)"/>
  <text x="150" y="291" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">Xem Dự Án</text>
  <rect x="235" y="265" width="120" height="42" rx="21" fill="none" stroke="#6366f1" stroke-width="2"/>
  <text x="295" y="291" fill="#a5b4fc" font-size="14" font-family="sans-serif" text-anchor="middle">Liên Hệ</text>
  <!-- Stats cards -->
  <rect x="80" y="350" width="130" height="80" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="145" y="385" fill="white" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">IELTS</text>
  <text x="145" y="408" fill="#a5b4fc" font-size="12" font-family="sans-serif" text-anchor="middle">5.5</text>
  <rect x="225" y="350" width="130" height="80" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="290" y="385" fill="white" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">10+</text>
  <text x="290" y="408" fill="#a5b4fc" font-size="12" font-family="sans-serif" text-anchor="middle">Dự Án</text>
  <!-- Avatar placeholder -->
  <circle cx="620" cy="280" r="120" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="2"/>
  <circle cx="620" cy="240" r="55" fill="url(#accent1)" opacity="0.8"/>
  <rect x="555" y="300" width="130" height="100" rx="65" fill="url(#accent1)" opacity="0.6"/>
  <!-- Glow effects -->
  <circle cx="150" cy="200" r="200" fill="rgba(99,102,241,0.05)"/>
  <circle cx="680" cy="100" r="150" fill="rgba(139,92,246,0.05)"/>
</svg>